<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>青溪國小 114學年度第2學期 社團報名</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pink: #FF6B9D;
  --purple: #C084FC;
  --blue: #60A5FA;
  --green: #34D399;
  --yellow: #FBBF24;
  --orange: #FB923C;
  --red: #F87171;
  --bg: #FFF5F7;
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Floating decorations */
.deco {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  opacity: 0.12;
  font-size: 60px;
  animation: floaty 6s ease-in-out infinite;
}
.deco:nth-child(1) { top: 5%; left: 3%; animation-delay: 0s; }
.deco:nth-child(2) { top: 15%; right: 5%; animation-delay: 1s; font-size: 50px; }
.deco:nth-child(3) { top: 40%; left: 2%; animation-delay: 2s; font-size: 45px; }
.deco:nth-child(4) { top: 60%; right: 3%; animation-delay: 3s; font-size: 55px; }
.deco:nth-child(5) { top: 80%; left: 5%; animation-delay: 4s; font-size: 40px; }
.deco:nth-child(6) { top: 30%; right: 8%; animation-delay: 5s; font-size: 48px; }

@keyframes floaty {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(10deg); }
}

/* Header */
.header {
  background: linear-gradient(135deg, #FF6B9D 0%, #C084FC 50%, #60A5FA 100%);
  padding: 40px 20px 50px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  right: 0;
  height: 40px;
  background: var(--bg);
  border-radius: 50% 50% 0 0;
}
.header h1 {
  color: #fff;
  font-size: 2.2em;
  font-weight: 900;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.15);
  margin-bottom: 8px;
}
.header .subtitle {
  color: rgba(255,255,255,0.92);
  font-size: 1.1em;
  font-weight: 500;
}
.header .mascot {
  font-size: 3.5em;
  display: block;
  margin-bottom: 10px;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* Main container */
.container {
  max-width: 800px;
  margin: -20px auto 40px;
  padding: 0 16px;
  position: relative;
  z-index: 1;
}

/* Steps indicator */
.steps {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.step-dot {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.9em;
  color: #fff;
  background: #E2E8F0;
  transition: all 0.4s;
  position: relative;
}
.step-dot.active {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  transform: scale(1.15);
  box-shadow: 0 4px 15px rgba(192, 132, 252, 0.4);
}
.step-dot.done {
  background: var(--green);
}
.step-connector {
  width: 40px;
  height: 3px;
  background: #E2E8F0;
  align-self: center;
  border-radius: 2px;
  transition: background 0.4s;
}
.step-connector.done { background: var(--green); }

/* Card sections */
.card {
  background: #fff;
  border-radius: 20px;
  padding: 28px 24px;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  border: 2px solid transparent;
  transition: border-color 0.3s;
}
.card:hover {
  border-color: rgba(192, 132, 252, 0.2);
}
.card-title {
  font-size: 1.25em;
  font-weight: 700;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title .icon {
  font-size: 1.4em;
}

/* Form elements */
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-group.full {
  grid-column: 1 / -1;
}
.form-group label {
  font-weight: 600;
  font-size: 0.92em;
  color: #4A5568;
}
.form-group label .req {
  color: var(--red);
  margin-left: 2px;
}
.form-group select,
.form-group input {
  padding: 12px 14px;
  border: 2px solid #E2E8F0;
  border-radius: 12px;
  font-size: 1em;
  font-family: inherit;
  transition: all 0.3s;
  background: #FAFAFA;
  outline: none;
}
.form-group select:focus,
.form-group input:focus {
  border-color: var(--purple);
  background: #fff;
  box-shadow: 0 0 0 4px rgba(192, 132, 252, 0.15);
}
.form-group input.error,
.form-group select.error {
  border-color: var(--red);
  box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.15);
}
.error-msg {
  color: var(--red);
  font-size: 0.82em;
  display: none;
}
.error-msg.show { display: block; }

/* Club category */
.club-category {
  margin-bottom: 20px;
}
.cat-header {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 0.95em;
  margin-bottom: 10px;
  color: #fff;
}
.cat-sports { background: linear-gradient(135deg, #F87171, #FB923C); }
.cat-dance { background: linear-gradient(135deg, #F472B6, #C084FC); }
.cat-art { background: linear-gradient(135deg, #34D399, #60A5FA); }
.cat-brain { background: linear-gradient(135deg, #60A5FA, #818CF8); }
.cat-swim { background: linear-gradient(135deg, #22D3EE, #3B82F6); }
.cat-other { background: linear-gradient(135deg, #FBBF24, #F97316); }

.club-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.club-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border: 2px solid #E2E8F0;
  border-radius: 25px;
  background: #FAFAFA;
  cursor: pointer;
  transition: all 0.25s;
  font-size: 0.9em;
  user-select: none;
}
.club-chip:hover {
  border-color: var(--purple);
  background: #FAF5FF;
  transform: translateY(-1px);
}
.club-chip.selected {
  border-color: var(--purple);
  background: linear-gradient(135deg, rgba(192,132,252,0.12), rgba(96,165,250,0.12));
  color: #7C3AED;
  font-weight: 600;
  box-shadow: 0 2px 10px rgba(192, 132, 252, 0.2);
}
.club-chip .check {
  width: 18px;
  height: 18px;
  border-radius: 5px;
  border: 2px solid #CBD5E1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s;
  flex-shrink: 0;
  font-size: 11px;
  color: transparent;
}
.club-chip.selected .check {
  background: var(--purple);
  border-color: var(--purple);
  color: #fff;
}

/* Selected clubs summary */
.selected-summary {
  background: linear-gradient(135deg, rgba(192,132,252,0.08), rgba(96,165,250,0.08));
  border-radius: 14px;
  padding: 14px 18px;
  margin-top: 16px;
  min-height: 50px;
}
.selected-summary .label {
  font-size: 0.85em;
  color: #7C3AED;
  font-weight: 600;
  margin-bottom: 6px;
}
.selected-summary .tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.selected-summary .tag {
  background: var(--purple);
  color: #fff;
  padding: 4px 12px;
  border-radius: 15px;
  font-size: 0.82em;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.selected-summary .tag:hover { opacity: 0.8; }
.selected-summary .tag .x { font-size: 0.9em; }
.selected-summary .empty {
  color: #A0AEC0;
  font-size: 0.88em;
}

/* Navigation buttons */
.nav-btns {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 24px;
}
.btn {
  padding: 14px 36px;
  border: none;
  border-radius: 14px;
  font-family: inherit;
  font-size: 1.05em;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff;
  box-shadow: 0 4px 15px rgba(192, 132, 252, 0.35);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(192, 132, 252, 0.45);
}
.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}
.btn-secondary {
  background: #EDF2F7;
  color: #4A5568;
}
.btn-secondary:hover {
  background: #E2E8F0;
}

/* Page visibility */
.page { display: none; }
.page.active { display: block; animation: fadeIn 0.4s; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Confirmation page */
.confirm-row {
  display: flex;
  padding: 12px 0;
  border-bottom: 1px solid #F0F0F0;
}
.confirm-row:last-child { border: none; }
.confirm-label {
  width: 100px;
  font-weight: 600;
  color: #7C3AED;
  flex-shrink: 0;
}
.confirm-value {
  flex: 1;
  color: #2D3748;
}
.confirm-clubs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.confirm-clubs .tag {
  background: linear-gradient(135deg, rgba(192,132,252,0.15), rgba(96,165,250,0.15));
  color: #7C3AED;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 0.88em;
  font-weight: 500;
}

/* Success page */
.success-page {
  text-align: center;
  padding: 40px 20px;
}
.success-icon {
  font-size: 5em;
  margin-bottom: 16px;
  animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.success-title {
  font-size: 1.6em;
  font-weight: 900;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}
.success-msg {
  color: #718096;
  font-size: 1em;
  line-height: 1.8;
}

/* Loading overlay */
.loading {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.85);
  z-index: 999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.loading.show { display: flex; }
.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid #E2E8F0;
  border-top-color: var(--purple);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Grade filter badges */
.grade-filter {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.grade-badge {
  padding: 6px 16px;
  border-radius: 20px;
  border: 2px solid #E2E8F0;
  background: #fff;
  cursor: pointer;
  font-size: 0.88em;
  font-weight: 600;
  transition: all 0.25s;
}
.grade-badge:hover { border-color: var(--purple); }
.grade-badge.active {
  background: var(--purple);
  border-color: var(--purple);
  color: #fff;
}

/* Note box */
.note-box {
  background: linear-gradient(135deg, #FFF7ED, #FFFBEB);
  border: 1px solid #FED7AA;
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 16px;
  font-size: 0.88em;
  color: #92400E;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.note-box .note-icon { font-size: 1.2em; flex-shrink: 0; margin-top: 1px; }

/* Responsive */
@media (max-width: 600px) {
  .header h1 { font-size: 1.6em; }
  .form-row { grid-template-columns: 1fr; }
  .card { padding: 20px 16px; }
  .btn { padding: 12px 24px; font-size: 0.95em; }
  .step-connector { width: 20px; }
  .club-chip { font-size: 0.84em; padding: 7px 11px; }
}
</style>
</head>
<body>

<!-- Floating decorations -->
<div class="deco">🎨</div>
<div class="deco">⚽</div>
<div class="deco">🎵</div>
<div class="deco">🏸</div>
<div class="deco">🎭</div>
<div class="deco">🌟</div>

<!-- Header -->
<div class="header">
  <span class="mascot">🎪</span>
  <h1>青溪國小 社團報名</h1>
  <div class="subtitle">114學年度 第2學期</div>
</div>

<!-- Main -->
<div class="container">

  <!-- Steps -->
  <div class="steps">
    <div class="step-dot active" id="s1">1</div>
    <div class="step-connector" id="sc1"></div>
    <div class="step-dot" id="s2">2</div>
    <div class="step-connector" id="sc2"></div>
    <div class="step-dot" id="s3">3</div>
  </div>

  <!-- ===== Page 1: Student Info ===== -->
  <div class="page active" id="page1">
    <div class="card">
      <div class="card-title"><span class="icon">📝</span> 填寫基本資料</div>
      <div class="form-row">
        <div class="form-group">
          <label>年級 <span class="req">*</span></label>
          <select id="grade">
            <option value="">請選擇年級</option>
            <option value="1">一年級</option>
            <option value="2">二年級</option>
            <option value="3">三年級</option>
            <option value="4">四年級</option>
            <option value="5">五年級</option>
            <option value="6">六年級</option>
          </select>
          <div class="error-msg" id="err-grade">請選擇年級</div>
        </div>
        <div class="form-group">
          <label>班級 <span class="req">*</span></label>
          <select id="classNum">
            <option value="">請先選年級</option>
          </select>
          <div class="error-msg" id="err-class">請選擇班級</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>座號 <span class="req">*</span></label>
          <input type="number" id="seatNum" placeholder="請輸入座號" min="1" max="40">
          <div class="error-msg" id="err-seat">請輸入座號</div>
        </div>
        <div class="form-group">
          <label>姓名 <span class="req">*</span></label>
          <input type="text" id="stuName" placeholder="請輸入姓名">
          <div class="error-msg" id="err-name">請輸入姓名</div>
        </div>
      </div>
    </div>

    <div class="nav-btns">
      <button class="btn btn-primary" onclick="goToPage(2)">下一步 選社團 →</button>
    </div>
  </div>

  <!-- ===== Page 2: Club Selection ===== -->
  <div class="page" id="page2">

    <div class="note-box">
      <span class="note-icon">💡</span>
      <span>點選想報名的社團，可以選擇多個社團。部分社團有年級限制，請注意標示說明。</span>
    </div>

    <!-- Grade filter (auto-set based on selection) -->
    <div class="card">
      <div class="card-title"><span class="icon">🏃</span> 運動類</div>
      <div class="club-grid" id="cat-sports"></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">💃</span> 舞蹈類</div>
      <div class="club-grid" id="cat-dance"></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">🎨</span> 藝術手作</div>
      <div class="club-grid" id="cat-art"></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">🧠</span> 益智學術</div>
      <div class="club-grid" id="cat-brain"></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">🏊</span> 游泳類</div>
      <div class="club-grid" id="cat-swim"></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">🎭</span> 表演其他</div>
      <div class="club-grid" id="cat-other"></div>
    </div>

    <!-- Selected summary -->
    <div class="card">
      <div class="selected-summary" id="selectedSummary">
        <div class="label">已選擇的社團：</div>
        <div class="tags" id="selectedTags">
          <span class="empty">尚未選擇任何社團</span>
        </div>
      </div>
    </div>

    <div class="nav-btns">
      <button class="btn btn-secondary" onclick="goToPage(1)">← 上一步</button>
      <button class="btn btn-primary" id="btnToConfirm" onclick="goToPage(3)">確認報名 →</button>
    </div>
  </div>

  <!-- ===== Page 3: Confirm ===== -->
  <div class="page" id="page3">
    <div class="card">
      <div class="card-title"><span class="icon">✅</span> 確認報名資料</div>
      <div id="confirmContent"></div>
    </div>
    <div class="nav-btns">
      <button class="btn btn-secondary" onclick="goToPage(2)">← 修改</button>
      <button class="btn btn-primary" id="btnSubmit" onclick="submitForm()">🎉 送出報名</button>
    </div>
  </div>

  <!-- ===== Page 4: Success ===== -->
  <div class="page" id="page4">
    <div class="card success-page">
      <div class="success-icon">🎊</div>
      <div class="success-title">報名成功！</div>
      <div class="success-msg">
        你的社團報名資料已送出<br>
        如需修改，請聯繫學務處<br><br>
        <span style="color:#A0AEC0;font-size:0.9em" id="submitTime"></span>
      </div>
      <div class="nav-btns" style="margin-top:30px">
        <button class="btn btn-primary" onclick="resetForm()">🔄 重新報名</button>
      </div>
    </div>
  </div>

</div>

<!-- Loading overlay -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="color:#7C3AED;font-weight:600">報名資料送出中...</div>
</div>

<script>
// ===== CONFIG =====

const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxPuAEHhaUNVvIgvGqoiDOBcEcdazrsQ8sl350BNnjUU8X8dqLFOdRklFGWLV_bIDV1XA/exec';

    { name: '圍棋(進階)', grades: [3,4,5,6] },
    { name: '益智桌遊', grades: [1,2,3,4,5,6] },
    { name: '奧林匹克數學社(低年級)', grades: [1,2,3] },
    { name: '奧林匹克數學社(中年級)', grades: [3,4,5] },
    { name: '科學玩很大(週二班)', grades: [1,2,3,4,5,6] },
    { name: '科學玩很大(週五班)', grades: [1,2,3,4,5,6] },
    { name: 'AI動力機器人(1至4年級)', grades: [1,2,3,4] },
    { name: 'AI程式機器人(3至6年級)', grades: [3,4,5,6] },
    { name: '語作班(3年級)', grades: [3] },
  ],
  swim: [
    { name: '常年泳訓班(日間班)', grades: [1,2,3,4,5,6] },
    { name: '常年泳訓班(夜間A班)', grades: [1,2,3,4,5,6] },
    { name: '常年泳訓班(夜間B班)', grades: [1,2,3,4,5,6] },
    { name: '游泳培訓社(限舊生)', grades: [1,2,3,4,5,6] },
  ],
  other: [
    { name: '魔術', grades: [1,2,3,4,5,6] },
    { name: '扯鈴', grades: [1,2,3,4,5,6] },
    { name: '劍道(新生)', grades: [1,2,3,4,5,6] },
    { name: '劍道(舊生)', grades: [1,2,3,4,5,6] },
  ]
};

// Class counts per grade (adjust as needed)
const classCounts = { 1: 8, 2: 8, 3: 9, 4: 9, 5: 10, 6: 10 };

let selectedClubs = new Set();
let currentPage = 1;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  renderClubs();
  document.getElementById('grade').addEventListener('change', onGradeChange);
});

function onGradeChange() {
  const grade = parseInt(document.getElementById('grade').value);
  const classSelect = document.getElementById('classNum');
  classSelect.innerHTML = '<option value="">請選擇班級</option>';
  if (grade) {
    for (let i = 1; i <= (classCounts[grade] || 10); i++) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${i} 班`;
      classSelect.appendChild(opt);
    }
  }
  // Re-render clubs for grade filter
  renderClubs();
}

function renderClubs() {
  const grade = parseInt(document.getElementById('grade').value) || 0;
  Object.keys(clubs).forEach(cat => {
    const container = document.getElementById('cat-' + cat);
    container.innerHTML = '';
    clubs[cat].forEach(club => {
      const available = grade === 0 || club.grades.includes(grade);
      const chip = document.createElement('div');
      chip.className = 'club-chip' + (selectedClubs.has(club.name) ? ' selected' : '');
      if (!available) {
        chip.style.opacity = '0.35';
        chip.style.pointerEvents = 'none';
      }
      chip.innerHTML = `<span class="check">${selectedClubs.has(club.name) ? '✓' : ''}</span>${club.name}`;
      chip.addEventListener('click', () => toggleClub(club.name));
      container.appendChild(chip);
    });
  });
  updateSummary();
}

function toggleClub(name) {
  if (selectedClubs.has(name)) {
    selectedClubs.delete(name);
  } else {
    selectedClubs.add(name);
  }
  renderClubs();
}

function updateSummary() {
  const tagsEl = document.getElementById('selectedTags');
  if (selectedClubs.size === 0) {
    tagsEl.innerHTML = '<span class="empty">尚未選擇任何社團</span>';
  } else {
    tagsEl.innerHTML = '';
    selectedClubs.forEach(name => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.innerHTML = `${name} <span class="x">✕</span>`;
      tag.addEventListener('click', () => toggleClub(name));
      tagsEl.appendChild(tag);
    });
  }
}

// ===== NAVIGATION =====
function goToPage(page) {
  // Validate page 1
  if (page === 2 && currentPage === 1) {
    if (!validatePage1()) return;
  }
  // Validate page 2
  if (page === 3 && currentPage === 2) {
    if (selectedClubs.size === 0) {
      alert('請至少選擇一個社團！');
      return;
    }
    buildConfirm();
  }

  // Show page
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + page).classList.add('active');

  // Update steps
  for (let i = 1; i <= 3; i++) {
    const dot = document.getElementById('s' + i);
    dot.classList.remove('active', 'done');
    if (i < page) dot.classList.add('done');
    if (i === page) dot.classList.add('active');
  }
  for (let i = 1; i <= 2; i++) {
    const conn = document.getElementById('sc' + i);
    conn.classList.toggle('done', i < page);
  }

  currentPage = page;
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Re-render clubs when entering page 2 (in case grade changed)
  if (page === 2) renderClubs();
}

function validatePage1() {
  let valid = true;
  const fields = [
    { id: 'grade', err: 'err-grade' },
    { id: 'classNum', err: 'err-class' },
    { id: 'seatNum', err: 'err-seat' },
    { id: 'stuName', err: 'err-name' },
  ];
  fields.forEach(f => {
    const el = document.getElementById(f.id);
    const errEl = document.getElementById(f.err);
    const val = el.value.trim();
    if (!val) {
      el.classList.add('error');
      errEl.classList.add('show');
      valid = false;
    } else {
      el.classList.remove('error');
      errEl.classList.remove('show');
    }
  });
  return valid;
}

function buildConfirm() {
  const grade = document.getElementById('grade');
  const cls = document.getElementById('classNum');
  const gradeName = grade.options[grade.selectedIndex].text;
  const className = cls.options[cls.selectedIndex].text;
  const seat = document.getElementById('seatNum').value;
  const name = document.getElementById('stuName').value;

  let html = `
    <div class="confirm-row">
      <div class="confirm-label">年級</div>
      <div class="confirm-value">${gradeName}</div>
    </div>
    <div class="confirm-row">
      <div class="confirm-label">班級</div>
      <div class="confirm-value">${className}</div>
    </div>
    <div class="confirm-row">
      <div class="confirm-label">座號</div>
      <div class="confirm-value">${seat} 號</div>
    </div>
    <div class="confirm-row">
      <div class="confirm-label">姓名</div>
      <div class="confirm-value">${name}</div>
    </div>
    <div class="confirm-row">
      <div class="confirm-label">報名社團</div>
      <div class="confirm-value">
        <div class="confirm-clubs">
          ${[...selectedClubs].map(c => `<span class="tag">${c}</span>`).join('')}
        </div>
      </div>
    </div>
  `;
  document.getElementById('confirmContent').innerHTML = html;
}

// ===== SUBMIT =====
function submitForm() {
  const data = {
    timestamp: new Date().toLocaleString('zh-TW'),
    grade: document.getElementById('grade').value,
    classNum: document.getElementById('classNum').value,
    seat: document.getElementById('seatNum').value,
    name: document.getElementById('stuName').value,
    clubs: [...selectedClubs].join('、')
  };

  // If no Google Script URL configured, show success directly
  if (!GOOGLE_SCRIPT_URL) {
    console.log('報名資料：', data);
    showSuccess(data.timestamp);
    return;
  }

  const loading = document.getElementById('loading');
  loading.classList.add('show');
  document.getElementById('btnSubmit').disabled = true;

  // 使用隱藏 iframe + 表單提交（最穩定的方式）
  let iframe = document.getElementById('hidden_iframe');
  if (!iframe) {
    iframe = document.createElement('iframe');
    iframe.id = 'hidden_iframe';
    iframe.name = 'hidden_iframe';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
  }

  const form = document.createElement('form');
  form.method = 'POST';
  form.action = GOOGLE_SCRIPT_URL;
  form.target = 'hidden_iframe';

  Object.entries(data).forEach(([key, value]) => {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = key;
    input.value = value;
    form.appendChild(input);
  });

  document.body.appendChild(form);
  form.submit();
  form.remove();

  // 等待一下讓表單送出完成
  setTimeout(() => {
    loading.classList.remove('show');
    document.getElementById('btnSubmit').disabled = false;
    showSuccess(data.timestamp);
  }, 2000);
}

function showSuccess(time) {
  document.getElementById('submitTime').textContent = '送出時間：' + time;
  goToPage(4);
  // Confetti effect
  createConfetti();
}

function resetForm() {
  document.getElementById('grade').value = '';
  document.getElementById('classNum').innerHTML = '<option value="">請先選年級</option>';
  document.getElementById('seatNum').value = '';
  document.getElementById('stuName').value = '';
  selectedClubs.clear();
  goToPage(1);
}

// ===== Confetti =====
function createConfetti() {
  const colors = ['#FF6B9D','#C084FC','#60A5FA','#34D399','#FBBF24','#FB923C'];
  for (let i = 0; i < 50; i++) {
    const c = document.createElement('div');
    c.style.cssText = `
      position: fixed;
      width: ${Math.random()*10+6}px;
      height: ${Math.random()*10+6}px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      top: -20px;
      left: ${Math.random()*100}%;
      z-index: 1000;
      pointer-events: none;
      animation: confettiFall ${Math.random()*2+2}s ease-out forwards;
      animation-delay: ${Math.random()*0.5}s;
    `;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
  // Add confetti keyframes if not exists
  if (!document.getElementById('confettiStyle')) {
    const style = document.createElement('style');
    style.id = 'confettiStyle';
    style.textContent = `
      @keyframes confettiFall {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
      }
    `;
    document.head.appendChild(style);
  }
}
</script>
